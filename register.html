<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white p-8 rounded shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Registro de Usuarios</h2>
            <form id="registerForm">
                <div class="mb-4">
                    <label class="block text-gray-700" for="username">Nombre de usuario</label>
                    <input type="text" id="username" class="w-full p-2 border border-gray-300 rounded mt-1" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700" for="email">Correo electrónico</label>
                    <input type="email" id="email" class="w-full p-2 border border-gray-300 rounded mt-1" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700" for="password">Contraseña</label>
                    <input type="password" id="password" class="w-full p-2 border border-gray-300 rounded mt-1" required>
                    <button id="show-password" class="text-gray-600 hover:text-gray-900 transition duration-300 ease-in-out">Mostrar</button>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700" for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" class="w-full p-2 border border-gray-300 rounded mt-1" required>
                    <button id="show-confirm-password" class="text-gray-600 hover:text-gray-900 transition duration-300 ease-in-out">Mostrar</button>
                </div>
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Registrarse</button>
            </form>
        </div>
    </div>

    <script>
        const showPasswordButton = document.getElementById('show-password');
        const passwordInput = document.getElementById('password');
        const showConfirmPasswordButton = document.getElementById('show-confirm-password');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        showPasswordButton.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                showPasswordButton.textContent = 'Ocultar';
            } else {
                passwordInput.type = 'password';
                showPasswordButton.textContent = 'Mostrar';
            }
        });

        showConfirmPasswordButton.addEventListener('click', () => {
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                showConfirmPasswordButton.textContent = 'Ocultar';
            } else {
                confirmPasswordInput.type = 'password';
                showConfirmPasswordButton.textContent = 'Mostrar';
            }
        });
    </script>
</body>
</html>
